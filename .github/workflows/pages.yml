name: Deploy wiki to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "**/wiki/**"
      - "quartz/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Quartz reads git history for created/modified dates

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build all vaults
        env:
          QUARTZ_BASE_HOST: ${{ github.repository_owner }}.github.io
          QUARTZ_BASE_PATH: /${{ github.event.repository.name }}
          QUARTZ_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: ./quartz/build.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
